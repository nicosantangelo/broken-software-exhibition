<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Broken Software Exhibition</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>The Broken Software Exhibition</h1>
      <p class="tagline">A curated collection of digital misfortune.</p>
    </header>
    <div class="sort-controls">
      <span class="sort-label">Sort by</span>
      <button class="sort-btn active" data-sort="date" data-dir="desc">Date ↓</button>
      <button class="sort-btn" data-sort="author" data-dir="asc">Author ↑</button>
    </div>
    <main id="gallery"></main>
    <div id="modal" class="modal">
      <div class="modal-content">
        <video id="modal-video" controls></video>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
