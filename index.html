<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broken software exhibition</title>
    <meta
      name="description"
      content="A curated collection of digital misfortune."
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Broken software exhibition</h1>
      <p class="tagline">A curated collection of digital misfortune.</p>
    </header>

    <div class="controls">
      <div class="sort-controls">
        <span class="control-label">Sort by</span>
        <button class="control-btn sort-btn active" data-sort="random">
          <svg
            class="btn-dice"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <rect x="3" y="3" width="18" height="18" rx="2.5" />
            <circle
              cx="8.5"
              cy="8.5"
              r="1.5"
              fill="currentColor"
              stroke="none"
            />
            <circle
              cx="15.5"
              cy="8.5"
              r="1.5"
              fill="currentColor"
              stroke="none"
            />
            <circle
              cx="8.5"
              cy="15.5"
              r="1.5"
              fill="currentColor"
              stroke="none"
            />
            <circle
              cx="15.5"
              cy="15.5"
              r="1.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
          Random
        </button>
        <button class="control-btn sort-btn" data-sort="date" data-dir="desc">
          ↓ Date
        </button>
        <button class="control-btn sort-btn" data-sort="author" data-dir="asc">
          ↑ Author
        </button>
      </div>
      <div class="filter-row">
        <div class="filter-controls">
          <span class="control-label">Filter</span>
          <button class="control-btn" id="favorite-filter">
            <span class="btn-star">★</span> Favorite
          </button>
        </div>
        <p class="control-label exhibit-count" id="exhibit-count"></p>
      </div>
    </div>

    <main class="gallery" id="gallery"></main>
    <div id="modal" class="modal">
      <div class="modal-info" id="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-description" id="modal-description"></div>
      </div>
      <button class="modal-nav modal-prev" id="modal-prev">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15,4 7,12 15,20" />
        </svg>
      </button>
      <div class="modal-content">
        <img id="modal-image" alt="" style="display: none" />
        <video id="modal-video" controls style="display: none"></video>
      </div>
      <button class="modal-nav modal-next" id="modal-next">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="9,4 17,12 9,20" />
        </svg>
      </button>
    </div>
    <footer>
      <p>At least with AI this won't ever happen again, right?</p>
      <p>
        Have something to exhibit?
        <a href="mailto:santangelonicolas+broken@gmail.com ">Send it over</a>
      </p>
      <p>Built by <a href="https://nicosantangelo.com">nicosantangelo</a></p>
    </footer>
    <script src="constants.js"></script>
    <script src="script.js"></script>
  </body>
</html>
