<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broken software exhibition</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Broken software exhibition</h1>
      <p class="tagline">A curated collection of digital misfortune.</p>
    </header>
    <div class="sort-controls">
      <span class="sort-label">Sort by</span>
      <button class="sort-btn active" data-sort="date" data-dir="desc">
        Date ↓
      </button>
      <button class="sort-btn" data-sort="author" data-dir="asc">
        Author ↑
      </button>
    </div>
    <div class="filter-controls">
      <span class="filter-label">Filter</span>
      <button class="filter-btn" id="favorite-filter">★ Favorite</button>
    </div>
    <main id="gallery"></main>
    <div id="modal" class="modal">
      <div class="modal-content">
        <img id="modal-image" style="display: none" />
        <video id="modal-video" controls style="display: none"></video>
      </div>
    </div>
    <footer>
      <p>At least with AI this won't ever happen again, right?</p>
      <p>
        Have something to exhibit?
        <a href="mailto:fillthislater@gmail.com">Send it over</a>
      </p>
      <p>Built by <a href="https://nicosantangelo.com">nicosantangelo</a></p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
