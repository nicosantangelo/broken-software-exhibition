              stroke="none"
            />

              cy="15.5"
              r="1.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
          Random
        </button>
        <button class="control-btn sort-btn" data-sort="date" data-dir="desc">
          ↓ Date
        </button>
        <button class="control-btn sort-btn" data-sort="author" data-dir="asc">
          ↑ Author
        </button>
      </div>
      <div class="filter-row">
        <div class="filter-controls">
          <span class="control-label">Filter</span>
          <button class="control-btn" id="favorite-filter">
            <span class="btn-star">★</span> Favorite
          </button>
        </div>
        <p class="control-label exhibit-count" id="exhibit-count"></p>
      </div>
    </div>

    <main class="gallery" id="gallery"></main>
    <div id="modal" class="modal">
      <div class="modal-info" id="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-description" id="modal-description"></div>
      </div>
      <button class="modal-nav modal-prev" id="modal-prev">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15,4 7,12 15,20" />
        </svg>
      </button>
      <div class="modal-content">
        <img id="modal-image" style="display: none" />
        <video id="modal-video" controls style="display: none"></video>
      </div>
      <button class="modal-nav modal-next" id="modal-next">

          fill="none"
          stroke="currentColor"
          stroke-width="2"

title-row"> <span class="title">${exhibit.title}</span> ${exhibit.starred ? `<span class="star-icon">★</span>` : ""}</div> <div class="description">${exhibit.description}</div> ${meta ? `<div class="meta">${meta}</div>` : ""}</div> `;card.querySelector(".exhibit-media").addEventListener("click",()=>{openModal(index);});fragment.appendChild(card);}gallery.appendChild(fragment);}function getVisibleExhibits(){return showOnlyFavorites ? exhibits.filter((exhibit)=> exhibit.starred): exhibits;}function updateHash(filename){history.pushState(null,"","#" + encodeURIComponent(filename));}function replaceHash(filename){history.replaceState(null,"","#" + encodeURIComponent(filename));}function clearHash(){const sortHash = buildSortHash();if(sortHash){history.pushState(null,"","#" + sortHash);}else{history.pushState(null,"",window.location.pathname);}}const SORT_TOKENS = new Set([ "date-asc","date-desc","author-asc","author-desc",]);function parseHash(hash){if(!hash){return{sort: null,filename: null};}if(hash.includes(".")){return{sort: null,filename: hash};}if(SORT_TOKENS.has(hash)){const separatorIndex = hash.lastIndexOf("-");return{sort:{field: hash.slice(0,separatorIndex),direction: hash.slice(separatorIndex + 1),},filename: null,};}return{sort: null,filename: null};}function buildSortHash(){if(currentSort.field === "random"){return "";}return currentSort.field + "-" + currentSort.direction;}function pushSortHash(){const sortHash = buildSortHash();if(sortHash){history.pushState(null,"","#" + sortHash);}else{history.pushState(null,"",window.location.pathname);}}function applySortFromHash(field,direction){for(const button of document.querySelectorAll(".sort-btn")){button.classList.remove("active");}const matchingButton = document.querySelector(`.sort-btn[data-sort="${field}"]`,);if(matchingButton){matchingButton.classList.add("active");if(field !== "random"){matchingButton.dataset.dir = direction;const arrow = direction === "asc" ? "↑" : "↓";const label = field.charAt(0).toUpperCase()+ field.slice(1);matchingButton.textContent = `${arrow}${label}`;}}currentSort ={field,direction};sortExhibits(field,direction);}function openModal(index){currentModalIndex = index;showModalContent();document.getElementById("modal").classList.add("active");const visibleExhibits = getVisibleExhibits();updateHash(visibleExhibits[currentModalIndex].file);}function showModalContent(){const visibleExhibits = getVisibleExhibits();const exhibit = visibleExhibits[currentModalIndex];const image = document.getElementById("modal-image");const video = document.getElementById("modal-video");document.getElementById("modal-title").textContent = exhibit.title;document.getElementById("modal-description").textContent = exhibit.description;video.pause();video.src = "";if(exhibit.type === "video"){image.style.display = "none";video.style.display = "block";video.src = exhibit.video;video.play();}else{video.style.display = "none";image.style.display = "block";image.src = exhibit.image;}}function navigateModal(direction){const visibleExhibits = getVisibleExhibits();const count = visibleExhibits.length;if(count === 0){return;}currentModalIndex =(currentModalIndex + direction + count)% count;showModalContent();replaceHash(visibleExhibits[currentModalIndex].file);}function silentCloseModal(){const modal = document.getElementById("modal");const image = document.getElementById("modal-image");const video = document.getElementById("modal-video");video.pause();video.src = "";video.style.display = "none";image.src = "";image.style.display = "none";modal.classList.remove("active");const cards = document.getElementById("gallery").children;if(currentModalIndex >= 0 && currentModalIndex < cards.length){cards[currentModalIndex].scrollIntoView({behavior: "smooth",block: "nearest",});}}function closeModal(){silentCloseModal();clearHash();}function openModalByFile(filename){const exhibit = exhibits.find((e)=> e.file === filename);if(!exhibit){return;}if(showOnlyFavorites && !exhibit.starred){show cument.querySelectorAll(".sort-btn")){sortButton.classList.remove("active");}button.classList.add("active");const direction = button.dataset.dir || null;currentSort ={field,direction};sortExhibits(field,direction);pushSortHash();});}document .getElementById("favorite-filter").addEventListener("click",(event)=>{showOnlyFavorites = !showOnlyFavorites;event.currentTarget.classList.toggle("active",showOnlyFavorites);renderGallery();});function loadExhibits(allExhibits){for(const item of allExhibits){const extension = item.file.split(".").pop().toLowerCase();const isVideo = ["mp4","mov","webm"].includes(extension);const baseName = item.file.substring(0,item.file.lastIndexOf("."));exhibits.push({file: item.file,image: resolvePath(`assets/${item.file}`),thumb: resolvePath(`assets/thumbs/${baseName}.jpg`),title: item.title || item.file,date: item.date || "",author: item.author || "",description: item.description || "",starred: !!item.starred,randomOrder: Math.random(),...(isVideo ?{type: "video",video: resolvePath(`assets/${item.file}`)}:{}),});}const initialHash = decodeURIComponent(window.location.hash.slice(1));const{sort: initialSort,filename: initialFilename}= parseHash(initialHash);if(initialFilename){const hashExhibit = exhibits.find((e)=> e.file === initialFilename);if(hashExhibit){hashExhibit.randomOrder = -1;}}document.getElementById("exhibit-count").textContent = `Exhibiting ${exhibits.length}pieces`;if(initialSort){applySortFromHash(initialSort.field,initialSort.direction);}else{sortExhibits("random");}if(initialFilename){openModalByFile(initialFilename);}}if(ALL_EXHIBITS){loadExhibits(ALL_EXHIBITS);}else{fetch("exhibits.json").then((response)=> response.json()).then(loadExhibits);}</script>
